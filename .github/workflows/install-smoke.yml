name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  python-regressions:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python regression suite
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          test_files=(tests/test_*.py)
          if ((${#test_files[@]} == 0)); then
            echo "No Python regression tests found under tests/test_*.py" >&2
            exit 1
          fi
          for test_file in "${test_files[@]}"; do
            echo "Running ${test_file}"
            python3 "$test_file"
          done

  install-smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Run install / health / teardown smoke test
        run: ./test.sh
