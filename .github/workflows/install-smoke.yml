name: CI

on:
  push:
    branches:
      - arclink
      - master
      - main
  pull_request:

jobs:
  python-regressions:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python regression dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run Python regression suite
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          test_files=(tests/test_*.py)
          if ((${#test_files[@]} == 0)); then
            echo "No Python regression tests found under tests/test_*.py" >&2
            exit 1
          fi
          for test_file in "${test_files[@]}"; do
            echo "Running ${test_file}"
            python3 "$test_file"
          done

  web-regressions:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run web lint, tests, and build
        working-directory: web
        run: |
          npm run lint
          npm test
          npm run build

  install-smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Run install / health / teardown smoke test
        run: ./test.sh
