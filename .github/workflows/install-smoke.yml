name: Install Smoke

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  install-smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Run install / health / teardown smoke test
        run: ./test.sh
