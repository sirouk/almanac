x-arclink-job: &arclink-job
  <<: *arclink-app
  restart: *restart-unless-stopped
  depends_on:
    arclink-mcp:
      condition: service_started
    qmd-mcp:
      condition: service_started

x-nextcloud-db-env: &nextcloud-db-env
  POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
  POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run ./deploy.sh control bootstrap first}

services:
  arclink-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ARCLINK_UID: ${ARCLINK_DOCKER_UID:-1000}
        ARCLINK_GID: ${ARCLINK_DOCKER_GID:-1000}
        ARCLINK_IMAGE_REVISION: ${ARCLINK_IMAGE_REVISION:-unknown}
    image: ${ARCLINK_DOCKER_IMAGE:-arclink/app:local}
    profiles: ["build"]
    command: ["true"]
    restart: "no"

  postgres:
    image: ${ARCLINK_POSTGRES_IMAGE:-docker.io/library/postgres}:${ARCLINK_POSTGRES_TAG:-16-alpine}
    restart: *restart-unless-stopped
    environment:
      <<: *nextcloud-db-env
    volumes:
      - ./arclink-priv/state/nextcloud/db:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nextcloud} -d $${POSTGRES_DB:-nextcloud}"]

  redis:
    image: ${ARCLINK_REDIS_IMAGE:-docker.io/library/redis}:${ARCLINK_REDIS_TAG:-7-alpine}
    restart: *restart-unless-stopped
    volumes:
      - ./arclink-priv/state/nextcloud/redis:/data
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD", "redis-cli", "ping"]

  nextcloud:
    image: ${ARCLINK_NEXTCLOUD_IMAGE:-docker.io/library/nextcloud}:${ARCLINK_NEXTCLOUD_TAG:-31-apache}
    restart: *restart-unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${NEXTCLOUD_PORT:-18080}:80"
    environment:
      <<: *nextcloud-db-env
      POSTGRES_HOST: postgres
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?run ./deploy.sh control bootstrap first}
      REDIS_HOST: redis
      NEXTCLOUD_TRUSTED_DOMAINS: localhost 127.0.0.1 ${NEXTCLOUD_TRUSTED_DOMAIN:-localhost}
      OVERWRITEPROTOCOL: ${NEXTCLOUD_OVERWRITEPROTOCOL:-http}
    volumes:
      - ./arclink-priv/state/nextcloud/config/arclink.config.php:/arclink-config/arclink.config.php:ro
      - ./arclink-priv/state/nextcloud/html:/var/www/html
      - ./arclink-priv/state/nextcloud/hooks/pre-installation:/docker-entrypoint-hooks.d/pre-installation
      - ./arclink-priv/state/nextcloud/hooks/post-installation:/docker-entrypoint-hooks.d/post-installation
      - ./arclink-priv/state/nextcloud/hooks/before-starting:/docker-entrypoint-hooks.d/before-starting
      - ./arclink-priv/state/nextcloud/empty-skeleton:/srv/nextcloud-empty-skeleton
      - ./arclink-priv/vault:/srv/vault
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/status.php >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10

  arclink-mcp:
    <<: *arclink-app
    command: ["./bin/arclink-mcp-server.sh", "--host", "0.0.0.0", "--port", "8282"]
    ports:
      - "127.0.0.1:${ARCLINK_MCP_PORT:-8282}:8282"
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8282/health >/dev/null"]

  qmd-mcp:
    <<: *arclink-app
    command: ["bash", "-lc", "mkdir -p \"$${XDG_CONFIG_HOME}/qmd\" \"$${XDG_CACHE_HOME}/qmd\" && exec ./bin/qmd-daemon.sh"]
    ports:
      - "127.0.0.1:${QMD_MCP_PORT:-8181}:8181"
    healthcheck:
      test: ["CMD-SHELL", "qmd --version >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 6

  control-operator-qmd-mcp:
    <<: *arclink-app
    environment:
      <<: *arclink-operator-env
    command: ["./bin/qmd-daemon.sh"]
    volumes:
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/state/operator/config:/home/arclink/arclink/arclink-priv/state/operator/config
      - ./arclink-priv/state/operator/quarto:/home/arclink/arclink/arclink-priv/state/operator/quarto
      - ./arclink-priv/state/operator/vault:/home/arclink/arclink/arclink-priv/state/operator/vault
      - ./arclink-priv/state/operator/qmd:/home/arclink/arclink/arclink-priv/state/operator/qmd
      - ./arclink-priv/state/operator/memory:/home/arclink/arclink/arclink-priv/state/operator/memory
      - ./arclink-priv/state/operator/vault:/srv/vault
      - ./arclink-priv/state/operator/qmd:/srv/qmd
      - ./arclink-priv/state/operator/memory:/srv/memory

  control-operator-hermes-gateway:
    <<: *arclink-app
    environment:
      <<: *arclink-operator-env
    command: ["bash", "-lc", "./bin/install-operator-hermes-home.sh && exec /opt/arclink/runtime/hermes-venv/bin/hermes gateway run --replace"]
    volumes:
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/state/operator/config:/home/arclink/arclink/arclink-priv/state/operator/config
      - ./arclink-priv/state/operator/quarto:/home/arclink/arclink/arclink-priv/state/operator/quarto
      - ./arclink-priv/state/operator/hermes-home:/home/arclink/arclink/arclink-priv/state/operator/hermes-home
      - ./arclink-priv/state/operator/vault:/home/arclink/arclink/arclink-priv/state/operator/vault
      - ./arclink-priv/state/operator/memory:/home/arclink/arclink/arclink-priv/state/operator/memory
      - ./arclink-priv/state/operator/workspace:/home/arclink/arclink/arclink-priv/state/operator/workspace
      - ./arclink-priv/state/operator/linked-resources:/home/arclink/arclink/arclink-priv/state/operator/linked-resources:ro
      - ./arclink-priv/state/operator/secrets:/home/arclink/arclink/arclink-priv/state/operator/secrets
    depends_on:
      control-operator-qmd-mcp:
        condition: service_started

  control-operator-hermes-dashboard:
    <<: *arclink-app
    environment:
      <<: *arclink-operator-env
    command: ["bash", "-lc", "./bin/install-operator-hermes-home.sh && exec ./bin/run-hermes-dashboard-proxy.sh"]
    ports:
      - "127.0.0.1:${ARCLINK_OPERATOR_HERMES_PORT:-13210}:3210"
    volumes:
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
