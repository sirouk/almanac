    volumes:
      - ./arclink-priv/state/operator/nextcloud/redis:/data
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD", "redis-cli", "ping"]

  control-operator-nextcloud:
    image: ${ARCLINK_NEXTCLOUD_IMAGE:-docker.io/library/nextcloud}:${ARCLINK_NEXTCLOUD_TAG:-31-apache}
    restart: *restart-unless-stopped
    depends_on:
      control-operator-nextcloud-db:
        condition: service_healthy
      control-operator-nextcloud-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ARCLINK_OPERATOR_NEXTCLOUD_PORT:-28081}:80"
    environment:
      POSTGRES_HOST: control-operator-nextcloud-db
      POSTGRES_DB: operator_nextcloud
