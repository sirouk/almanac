      <<: *arclink-operator-env
    command: ["./bin/docker-job-loop.sh", "operator-memory-synth", "1800", "./bin/memory-synth.sh"]
    volumes:
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/state/operator/config:/home/arclink/arclink/arclink-priv/state/operator/config
      - ./arclink-priv/state/operator/quarto:/home/arclink/arclink/arclink-priv/state/operator/quarto
      - ./arclink-priv/state/operator/vault:/home/arclink/arclink/arclink-priv/state/operator/vault
      - ./arclink-priv/state/operator/memory:/home/arclink/arclink/arclink-priv/state/operator/memory
    depends_on:
      control-operator-qmd-mcp:
        condition: service_started

  control-operator-nextcloud-db:
    image: ${ARCLINK_POSTGRES_IMAGE:-docker.io/library/postgres}:${ARCLINK_POSTGRES_TAG:-16-alpine}
    restart: *restart-unless-stopped
    environment:
      POSTGRES_DB: operator_nextcloud
