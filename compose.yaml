name: arclink

x-restart-unless-stopped: &restart-unless-stopped unless-stopped
x-healthcheck-fast: &healthcheck-fast
  interval: 10s
  timeout: 5s
  retries: 6
x-healthcheck-http: &healthcheck-http
  interval: 20s
  timeout: 5s
  retries: 10

x-arclink-app: &arclink-app
  image: ${ARCLINK_DOCKER_IMAGE:-arclink/app:local}
  restart: *restart-unless-stopped
  environment: &arclink-env
    ARCLINK_DOCKER_MODE: "1"
    ARCLINK_PRODUCT_NAME: ${ARCLINK_PRODUCT_NAME:-ArcLink}
    ARCLINK_BASE_DOMAIN: ${ARCLINK_BASE_DOMAIN:-arclink.online}
    ARCLINK_INGRESS_MODE: ${ARCLINK_INGRESS_MODE:-domain}
    ARCLINK_TAILSCALE_DNS_NAME: ${ARCLINK_TAILSCALE_DNS_NAME:-}
    ARCLINK_TAILSCALE_CONTROL_URL: ${ARCLINK_TAILSCALE_CONTROL_URL:-}
    ARCLINK_TAILSCALE_HTTPS_PORT: ${ARCLINK_TAILSCALE_HTTPS_PORT:-443}
    ARCLINK_TAILSCALE_NOTION_PATH: ${ARCLINK_TAILSCALE_NOTION_PATH:-/notion/webhook}
    ARCLINK_TAILSCALE_DEPLOYMENT_HOST_STRATEGY: ${ARCLINK_TAILSCALE_DEPLOYMENT_HOST_STRATEGY:-path}
    ARCLINK_PRIMARY_PROVIDER: ${ARCLINK_PRIMARY_PROVIDER:-chutes}
    ARCLINK_SQLITE_JOURNAL_MODE: ${ARCLINK_SQLITE_JOURNAL_MODE:-DELETE}
    ARCLINK_BACKEND_ALLOWED_CIDRS: ${ARCLINK_BACKEND_ALLOWED_CIDRS:-172.16.0.0/12}
    QMD_MCP_HOST_PORT: ${QMD_MCP_PORT:-8181}
    QMD_MCP_CONTAINER_PORT: ${QMD_MCP_CONTAINER_PORT:-8181}
    QMD_MCP_LOOPBACK_PORT: ${QMD_MCP_LOOPBACK_PORT:-18181}
    ARCLINK_CONFIG_FILE: /home/arclink/arclink/arclink-priv/config/docker.env
    ARCLINK_REPO_DIR: /home/arclink/arclink
    ARCLINK_PRIV_DIR: /home/arclink/arclink/arclink-priv
    ARCLINK_DOCKER_CONTAINER_PRIV_DIR: /home/arclink/arclink/arclink-priv
    ARCLINK_DOCKER_AGENT_HOME_ROOT: /home/arclink/arclink/arclink-priv/state/docker/users
    ARCLINK_DOCKER_HOST_REPO_DIR: ${ARCLINK_DOCKER_HOST_REPO_DIR:-}
    ARCLINK_DOCKER_HOST_PRIV_DIR: ${ARCLINK_DOCKER_HOST_PRIV_DIR:-}
    ARCLINK_DOCKER_IMAGE: ${ARCLINK_DOCKER_IMAGE:-arclink/app:local}
    ARCLINK_DOCKER_NETWORK: ${ARCLINK_DOCKER_NETWORK:-arclink_default}
    ARCLINK_API_HOST: ${ARCLINK_API_HOST:-0.0.0.0}
    ARCLINK_API_PORT: ${ARCLINK_API_CONTAINER_PORT:-8900}
    ARCLINK_WEB_PORT: ${ARCLINK_WEB_CONTAINER_PORT:-3000}
    ARCLINK_CORS_ORIGIN: ${ARCLINK_CORS_ORIGIN:-}
    ARCLINK_COOKIE_DOMAIN: ${ARCLINK_COOKIE_DOMAIN:-}
    ARCLINK_DEFAULT_PRICE_ID: ${ARCLINK_DEFAULT_PRICE_ID:-price_arclink_starter}
    ARCLINK_FIRST_AGENT_PRICE_ID: ${ARCLINK_FIRST_AGENT_PRICE_ID:-price_arclink_starter}
    ARCLINK_ADDITIONAL_AGENT_PRICE_ID: ${ARCLINK_ADDITIONAL_AGENT_PRICE_ID:-price_arclink_additional_agent}
    ARCLINK_FIRST_AGENT_MONTHLY_CENTS: ${ARCLINK_FIRST_AGENT_MONTHLY_CENTS:-3500}
    ARCLINK_ADDITIONAL_AGENT_MONTHLY_CENTS: ${ARCLINK_ADDITIONAL_AGENT_MONTHLY_CENTS:-1500}
    STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
    CHUTES_API_KEY: ${CHUTES_API_KEY:-}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
    DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
    DISCORD_APP_ID: ${DISCORD_APP_ID:-}
    DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:-}
    ARCLINK_API_INTERNAL_URL: ${ARCLINK_API_INTERNAL_URL:-http://control-api:8900}
    ARCLINK_CONTROL_PROVISIONER_ENABLED: ${ARCLINK_CONTROL_PROVISIONER_ENABLED:-0}
    ARCLINK_CONTROL_PROVISIONER_INTERVAL_SECONDS: ${ARCLINK_CONTROL_PROVISIONER_INTERVAL_SECONDS:-30}
    ARCLINK_CONTROL_PROVISIONER_BATCH_SIZE: ${ARCLINK_CONTROL_PROVISIONER_BATCH_SIZE:-5}
    ARCLINK_SOVEREIGN_PROVISION_MAX_ATTEMPTS: ${ARCLINK_SOVEREIGN_PROVISION_MAX_ATTEMPTS:-5}
    ARCLINK_EXECUTOR_ADAPTER: ${ARCLINK_EXECUTOR_ADAPTER:-disabled}
    ARCLINK_EDGE_TARGET: ${ARCLINK_EDGE_TARGET:-edge.arclink.online}
    ARCLINK_STATE_ROOT_BASE: ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
    ARCLINK_SECRET_STORE_DIR: ${ARCLINK_SECRET_STORE_DIR:-/home/arclink/arclink/arclink-priv/state/sovereign-secrets}
    ARCLINK_REGISTER_LOCAL_FLEET_HOST: ${ARCLINK_REGISTER_LOCAL_FLEET_HOST:-0}
    ARCLINK_LOCAL_FLEET_HOSTNAME: ${ARCLINK_LOCAL_FLEET_HOSTNAME:-}
    ARCLINK_LOCAL_FLEET_SSH_HOST: ${ARCLINK_LOCAL_FLEET_SSH_HOST:-}
    ARCLINK_LOCAL_FLEET_SSH_USER: ${ARCLINK_LOCAL_FLEET_SSH_USER:-arclink}
    ARCLINK_LOCAL_FLEET_REGION: ${ARCLINK_LOCAL_FLEET_REGION:-}
    ARCLINK_LOCAL_FLEET_CAPACITY_SLOTS: ${ARCLINK_LOCAL_FLEET_CAPACITY_SLOTS:-4}
    ARCLINK_FLEET_SSH_KEY_PATH: ${ARCLINK_FLEET_SSH_KEY_PATH:-/home/arclink/arclink/arclink-priv/secrets/ssh/id_ed25519}
    ARCLINK_FLEET_SSH_KNOWN_HOSTS_FILE: ${ARCLINK_FLEET_SSH_KNOWN_HOSTS_FILE:-/home/arclink/arclink/arclink-priv/secrets/ssh/known_hosts}
    RUNTIME_DIR: /opt/arclink/runtime
    HOME: /home/arclink
    XDG_CONFIG_HOME: /home/arclink/.qmd/config
    XDG_CACHE_HOME: /home/arclink/.qmd/cache
    ARCLINK_MEMORY_SYNTH_ENABLED: ${ARCLINK_MEMORY_SYNTH_ENABLED:-auto}
    ARCLINK_MEMORY_SYNTH_ENDPOINT: ${ARCLINK_MEMORY_SYNTH_ENDPOINT:-}
    ARCLINK_MEMORY_SYNTH_MODEL: ${ARCLINK_MEMORY_SYNTH_MODEL:-}
    ARCLINK_MEMORY_SYNTH_API_KEY: ${ARCLINK_MEMORY_SYNTH_API_KEY:-}
    ARCLINK_MEMORY_SYNTH_MAX_SOURCES_PER_RUN: ${ARCLINK_MEMORY_SYNTH_MAX_SOURCES_PER_RUN:-12}
    ARCLINK_MEMORY_SYNTH_MAX_SOURCE_CHARS: ${ARCLINK_MEMORY_SYNTH_MAX_SOURCE_CHARS:-4500}
    ARCLINK_MEMORY_SYNTH_MAX_OUTPUT_TOKENS: ${ARCLINK_MEMORY_SYNTH_MAX_OUTPUT_TOKENS:-450}
    ARCLINK_MEMORY_SYNTH_TIMEOUT_SECONDS: ${ARCLINK_MEMORY_SYNTH_TIMEOUT_SECONDS:-60}
    ARCLINK_MEMORY_SYNTH_FAILURE_RETRY_SECONDS: ${ARCLINK_MEMORY_SYNTH_FAILURE_RETRY_SECONDS:-3600}
    ARCLINK_MEMORY_SYNTH_CARDS_IN_CONTEXT: ${ARCLINK_MEMORY_SYNTH_CARDS_IN_CONTEXT:-8}
    ARCLINK_MEMORY_SYNTH_ON_VAULT_CHANGE: ${ARCLINK_MEMORY_SYNTH_ON_VAULT_CHANGE:-1}
  volumes:
    - ./arclink-priv:/home/arclink/arclink/arclink-priv
    - arclink-qmd:/home/arclink/.qmd
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-arclink-job: &arclink-job
  <<: *arclink-app
  restart: *restart-unless-stopped
  depends_on:
    arclink-mcp:
      condition: service_started
    qmd-mcp:
      condition: service_started

x-nextcloud-db-env: &nextcloud-db-env
  POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
  POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run ./deploy.sh docker bootstrap first}

services:
  arclink-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ARCLINK_DOCKER_IMAGE:-arclink/app:local}
    profiles: ["build"]
    command: ["true"]
    restart: "no"

  postgres:
    image: ${ARCLINK_POSTGRES_IMAGE:-docker.io/library/postgres}:${ARCLINK_POSTGRES_TAG:-16-alpine}
    restart: *restart-unless-stopped
    environment:
      <<: *nextcloud-db-env
    volumes:
      - ./arclink-priv/state/nextcloud/db:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nextcloud} -d $${POSTGRES_DB:-nextcloud}"]

  redis:
    image: ${ARCLINK_REDIS_IMAGE:-docker.io/library/redis}:${ARCLINK_REDIS_TAG:-7-alpine}
    restart: *restart-unless-stopped
    volumes:
      - ./arclink-priv/state/nextcloud/redis:/data
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD", "redis-cli", "ping"]

  nextcloud:
    image: ${ARCLINK_NEXTCLOUD_IMAGE:-docker.io/library/nextcloud}:${ARCLINK_NEXTCLOUD_TAG:-31-apache}
    restart: *restart-unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${NEXTCLOUD_PORT:-18080}:80"
    environment:
      <<: *nextcloud-db-env
      POSTGRES_HOST: postgres
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?run ./deploy.sh docker bootstrap first}
      REDIS_HOST: redis
      NEXTCLOUD_TRUSTED_DOMAINS: localhost 127.0.0.1 ${NEXTCLOUD_TRUSTED_DOMAIN:-localhost}
      OVERWRITEPROTOCOL: ${NEXTCLOUD_OVERWRITEPROTOCOL:-http}
    volumes:
      - ./arclink-priv/state/nextcloud/config/arclink.config.php:/arclink-config/arclink.config.php:ro
      - ./arclink-priv/state/nextcloud/html:/var/www/html
      - ./arclink-priv/state/nextcloud/hooks/pre-installation:/docker-entrypoint-hooks.d/pre-installation
      - ./arclink-priv/state/nextcloud/hooks/post-installation:/docker-entrypoint-hooks.d/post-installation
      - ./arclink-priv/state/nextcloud/hooks/before-starting:/docker-entrypoint-hooks.d/before-starting
      - ./arclink-priv/state/nextcloud/empty-skeleton:/srv/nextcloud-empty-skeleton
      - ./arclink-priv/vault:/srv/vault
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/status.php >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10

  arclink-mcp:
    <<: *arclink-app
    command: ["./bin/arclink-mcp-server.sh", "--host", "0.0.0.0", "--port", "8282"]
    ports:
      - "127.0.0.1:${ARCLINK_MCP_PORT:-8282}:8282"
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8282/health >/dev/null"]

  qmd-mcp:
    <<: *arclink-app
    command: ["bash", "-lc", "mkdir -p \"$${XDG_CONFIG_HOME}/qmd\" \"$${XDG_CACHE_HOME}/qmd\" && exec ./bin/qmd-daemon.sh"]
    ports:
      - "127.0.0.1:${QMD_MCP_PORT:-8181}:8181"
    healthcheck:
      test: ["CMD-SHELL", "qmd --version >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 6

  notion-webhook:
    <<: *arclink-app
    command: ["./bin/arclink-notion-webhook.sh", "--host", "0.0.0.0", "--port", "8283"]
    ports:
      - "127.0.0.1:${ARCLINK_NOTION_WEBHOOK_PORT:-8283}:8283"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arclink-control-notion.rule=PathPrefix(`/notion/webhook`)"
      - "traefik.http.routers.arclink-control-notion.entrypoints=web"
      - "traefik.http.routers.arclink-control-notion.priority=200"
      - "traefik.http.services.arclink-control-notion.loadbalancer.server.port=8283"
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8283/health >/dev/null"]

  control-api:
    <<: *arclink-app
    command: ["python3", "python/arclink_hosted_api.py"]
    ports:
      - "127.0.0.1:${ARCLINK_API_PORT:-8900}:8900"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arclink-control-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.arclink-control-api.entrypoints=web"
      - "traefik.http.routers.arclink-control-api.priority=150"
      - "traefik.http.services.arclink-control-api.loadbalancer.server.port=8900"
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8900/api/v1/health >/dev/null"]

  control-web:
    <<: *arclink-app
    command: ["sh", "-lc", "cd web && npm run start -- --hostname 0.0.0.0 --port 3000"]
    depends_on:
      control-api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arclink-control-web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.arclink-control-web.entrypoints=web"
      - "traefik.http.routers.arclink-control-web.priority=1"
      - "traefik.http.services.arclink-control-web.loadbalancer.server.port=3000"
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000 >/dev/null"]

  control-ingress:
    image: ${ARCLINK_TRAEFIK_IMAGE:-docker.io/library/traefik:v3}
    restart: *restart-unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8080"
      - "--api.dashboard=false"
      - "--log.level=INFO"
    ports:
      - "127.0.0.1:${ARCLINK_WEB_PORT:-3000}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      control-web:
        condition: service_healthy
      control-api:
        condition: service_healthy

  control-provisioner:
    <<: *arclink-app
    volumes:
      - ./arclink-priv:/home/arclink/arclink/arclink-priv
      - arclink-qmd:/home/arclink/.qmd
      - ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}:${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
      - ./arclink-priv/secrets/ssh:/root/.ssh
      # Intentional trusted-host boundary: the Sovereign provisioner needs
      # Docker API access when ARCLINK_EXECUTOR_ADAPTER=local.
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - ./bin/docker-job-loop.sh
      - control-provisioner
      - ${ARCLINK_CONTROL_PROVISIONER_INTERVAL_SECONDS:-30}
      - python3
      - python/arclink_sovereign_worker.py
      - --once
      - --json
    depends_on:
      control-api:
        condition: service_healthy

  vault-watch:
    <<: *arclink-app
    command: ["./bin/vault-watch.sh"]
    depends_on:
      qmd-mcp:
        condition: service_started

  agent-supervisor:
    <<: *arclink-job
    environment:
      <<: *arclink-env
      ARCLINK_CONTAINER_RUNTIME: docker
      ARCLINK_AGENT_SERVICE_MANAGER: docker-supervisor
    volumes:
      - .:/home/arclink/arclink
      - ./arclink-priv:/home/arclink/arclink/arclink-priv
      - arclink-qmd:/home/arclink/.qmd
      - ${ARCLINK_DOCKER_HOST_REPO_DIR:-.}:${ARCLINK_DOCKER_HOST_REPO_DIR:-/home/arclink/arclink}
      # Intentional trusted-host boundary: the supervisor needs Docker API
      # access to reconcile per-agent containers, dashboard proxies, and
      # queued Docker-mode operator upgrades.
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["./bin/docker-agent-supervisor.sh"]

  ssot-batcher:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "ssot-batcher", "300", "./bin/arclink-ssot-batcher.sh"]

  notification-delivery:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "notification-delivery", "60", "./bin/arclink-notification-delivery.sh"]

  health-watch:
    <<: *arclink-job
    environment:
      <<: *arclink-env
      ARCLINK_HEALTH_WATCH_HEALTH_CMD: ./bin/docker-health.sh
    command: ["./bin/docker-job-loop.sh", "health-watch", "300", "./bin/health-watch.sh"]

  curator-refresh:
    <<: *arclink-job
    volumes:
      - .:/home/arclink/arclink
      - ./arclink-priv:/home/arclink/arclink/arclink-priv
      - arclink-qmd:/home/arclink/.qmd
      - ${ARCLINK_DOCKER_HOST_REPO_DIR:-.}:${ARCLINK_DOCKER_HOST_REPO_DIR:-/home/arclink/arclink}
      # Trusted operator-action boundary: Curator refresh consumes queued
      # operator upgrade requests and needs to run Docker Compose on the host.
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["./bin/docker-job-loop.sh", "curator-refresh", "900", "./bin/curator-refresh.sh"]

  qmd-refresh:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "qmd-refresh", "300", "./bin/qmd-refresh.sh", "--skip-embed"]

  pdf-ingest:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "pdf-ingest", "300", "./bin/pdf-ingest.sh", "--quiet"]

  memory-synth:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "memory-synth", "1800", "./bin/memory-synth.sh"]

  hermes-docs-sync:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "hermes-docs-sync", "3600", "./bin/sync-hermes-docs-into-vault.sh"]

  quarto-render:
    <<: *arclink-job
    profiles: ["quarto"]
    command: ["./bin/docker-job-loop.sh", "quarto-render", "900", "./bin/render-quarto.sh"]

  backup:
    <<: *arclink-job
    profiles: ["backup"]
    command: ["./bin/docker-job-loop.sh", "backup", "3600", "./bin/backup-to-github.sh"]

  curator-gateway:
    <<: *arclink-app
    profiles: ["curator"]
    restart: on-failure
    command: ["./bin/curator-gateway.sh"]

  curator-onboarding:
    <<: *arclink-app
    profiles: ["curator"]
    restart: on-failure
    command: ["./bin/arclink-curator-onboarding.sh"]

  curator-discord-onboarding:
    <<: *arclink-app
    profiles: ["curator"]
    restart: on-failure
    command: ["./bin/arclink-curator-discord-onboarding.sh"]

volumes:
  arclink-qmd:
