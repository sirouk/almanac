      - ./arclink-priv/state/operator/config:/home/arclink/arclink/arclink-priv/state/operator/config
      - ./arclink-priv/state/operator/quarto:/home/arclink/arclink/arclink-priv/state/operator/quarto
      - ./arclink-priv/state/operator/vault:/home/arclink/arclink/arclink-priv/state/operator/vault
      - ./arclink-priv/state/operator/memory:/home/arclink/arclink/arclink-priv/state/operator/memory

  notion-webhook:
    <<: *arclink-app
    command: ["./bin/arclink-notion-webhook.sh", "--host", "0.0.0.0", "--port", "8283"]
    ports:
      - "127.0.0.1:${ARCLINK_NOTION_WEBHOOK_PORT:-8283}:8283"
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8283/health >/dev/null"]

  control-api:
    <<: *arclink-app
    environment:
      <<: [*arclink-env, *arclink-control-secret-env]
    command: ["python3", "python/arclink_hosted_api.py"]
    volumes:
      - ./arclink-priv/config:/home/arclink/arclink/arclink-priv/config
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/vault:/home/arclink/arclink/arclink-priv/vault
      - ./arclink-priv/published:/home/arclink/arclink/arclink-priv/published
      - ./arclink-priv/quarto:/home/arclink/arclink/arclink-priv/quarto
      - ./arclink-priv/secrets/container:/home/arclink/arclink/arclink-priv/secrets
      - arclink-qmd:/home/arclink/.qmd
      - ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}:${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
    ports:
      - "127.0.0.1:${ARCLINK_API_PORT:-8900}:8900"
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8900/api/v1/health >/dev/null"]

  control-llm-router:
    <<: *arclink-app
    environment:
      <<: *arclink-env
      ARCLINK_DB_PATH: /home/arclink/arclink/arclink-priv/state/arclink-control.sqlite3
      ARCLINK_LLM_ROUTER_ENABLED: ${ARCLINK_LLM_ROUTER_ENABLED:-1}
      ARCLINK_LLM_ROUTER_CHUTES_BASE_URL: ${ARCLINK_LLM_ROUTER_CHUTES_BASE_URL:-https://llm.chutes.ai/v1}
      ARCLINK_LLM_ROUTER_CHUTES_API_KEY: ${ARCLINK_LLM_ROUTER_CHUTES_API_KEY:-}
      ARCLINK_LLM_ROUTER_KEY_HASH_PEPPER: ${ARCLINK_LLM_ROUTER_KEY_HASH_PEPPER:-}
      ARCLINK_LLM_ROUTER_DEFAULT_MODEL: ${ARCLINK_LLM_ROUTER_DEFAULT_MODEL:-moonshotai/Kimi-K2.6-TEE}
      ARCLINK_LLM_ROUTER_ALLOWED_MODELS: ${ARCLINK_LLM_ROUTER_ALLOWED_MODELS:-}
      ARCLINK_LLM_ROUTER_FALLBACK_MODELS: ${ARCLINK_LLM_ROUTER_FALLBACK_MODELS:-}
      ARCLINK_LLM_ROUTER_FALLBACK_STATUS_CODES: ${ARCLINK_LLM_ROUTER_FALLBACK_STATUS_CODES:-}
      ARCLINK_LLM_ROUTER_MODEL_AUTO_PROMOTE: ${ARCLINK_LLM_ROUTER_MODEL_AUTO_PROMOTE:-1}
      ARCLINK_LLM_ROUTER_MODEL_REPLACEMENTS: ${ARCLINK_LLM_ROUTER_MODEL_REPLACEMENTS:-}
      ARCLINK_LLM_ROUTER_REFRESH_MODEL_CATALOG_ON_STARTUP: ${ARCLINK_LLM_ROUTER_REFRESH_MODEL_CATALOG_ON_STARTUP:-1}
      ARCLINK_LLM_ROUTER_MARK_MISSING_MODELS_UNAVAILABLE: ${ARCLINK_LLM_ROUTER_MARK_MISSING_MODELS_UNAVAILABLE:-1}
      ARCLINK_LLM_ROUTER_MODEL_CATALOG_AUTH_STRATEGY: ${ARCLINK_LLM_ROUTER_MODEL_CATALOG_AUTH_STRATEGY:-bearer}
      ARCLINK_LLM_ROUTER_DEFAULT_MONTHLY_BUDGET_CENTS: ${ARCLINK_LLM_ROUTER_DEFAULT_MONTHLY_BUDGET_CENTS:-2500}
      ARCLINK_LLM_ROUTER_CENTS_PER_MILLION_INPUT_TOKENS: ${ARCLINK_LLM_ROUTER_CENTS_PER_MILLION_INPUT_TOKENS:-95}
      ARCLINK_LLM_ROUTER_CENTS_PER_MILLION_OUTPUT_TOKENS: ${ARCLINK_LLM_ROUTER_CENTS_PER_MILLION_OUTPUT_TOKENS:-400}
    command: ["python3", "-m", "uvicorn", "arclink_llm_router:app", "--app-dir", "python", "--host", "0.0.0.0", "--port", "8090"]
    ports:
      - "127.0.0.1:${ARCLINK_LLM_ROUTER_PORT:-8090}:8090"
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/health >/dev/null"]

  control-web:
    <<: *arclink-app
    volumes: []
    command: ["sh", "-lc", "cd web && npm run start -- --hostname 0.0.0.0 --port 3000"]
    depends_on:
      control-api:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000 >/dev/null"]

  control-ingress:
    image: ${ARCLINK_TRAEFIK_IMAGE:-docker.io/library/traefik:v3}
    restart: *restart-unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - "--providers.file.filename=/etc/traefik/dynamic/arclink-control.yaml"
      - "--providers.file.watch=false"
      - "--entrypoints.web.address=:8080"
      - "--api.dashboard=false"
      - "--ping=true"
      - "--ping.entrypoint=web"
      - "--log.level=INFO"
    ports:
      - "127.0.0.1:${ARCLINK_WEB_PORT:-3000}:8080"
    volumes:
      - ./config/traefik-control.yaml:/etc/traefik/dynamic/arclink-control.yaml:ro
    depends_on:
      notion-webhook:
        condition: service_healthy
      control-web:
        condition: service_healthy
      control-api:
        condition: service_healthy
      control-llm-router:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-http
      test: ["CMD", "traefik", "healthcheck", "--ping"]

  deployment-exec-broker:
    <<: *arclink-app
    cap_drop:
      - ALL
    environment:
      ARCLINK_STATE_ROOT_BASE: ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
      ARCLINK_DOCKER_BINARY: ${ARCLINK_DOCKER_BINARY:-docker}
      ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED: ${ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED:-}
      ARCLINK_DEPLOYMENT_EXEC_BROKER_TOKEN: ${ARCLINK_DEPLOYMENT_EXEC_BROKER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_DEPLOYMENT_EXEC_BROKER_HOST: 0.0.0.0
      ARCLINK_DEPLOYMENT_EXEC_BROKER_PORT: 8912
    group_add:
      - ${ARCLINK_DOCKER_SOCKET_GID:-0}
    volumes:
      - ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}:${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
      # Intentional trusted-host broker boundary: local deployment apply and
      # lifecycle requests are reconstructed here from a small operation
      # allowlist before Docker Compose receives them.
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python3", "python/arclink_deployment_exec_broker.py"]
    networks:
      - deployment-exec-broker-net
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8912/health >/dev/null"]

  migration-capture-helper:
    <<: *arclink-app
    # Intentional trusted-host root boundary: Pod migration file capture can
    # read root-owned service bind mounts, but accepts only capture/materialize
    # requests with deployment-scoped paths and never mounts the Docker socket.
    user: "0:0"
    cap_drop:
      - ALL
    environment:
      ARCLINK_STATE_ROOT_BASE: ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
      ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED: ${ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED:-}
      ARCLINK_MIGRATION_CAPTURE_HELPER_TOKEN: ${ARCLINK_MIGRATION_CAPTURE_HELPER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_MIGRATION_CAPTURE_HELPER_HOST: 0.0.0.0
      ARCLINK_MIGRATION_CAPTURE_HELPER_PORT: 8914
    volumes:
      - ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}:${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
    command: ["python3", "python/arclink_migration_capture_helper.py"]
    networks:
      - migration-capture-helper-net
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8914/health >/dev/null"]

  control-provisioner:
    <<: *arclink-app
    cap_drop:
      - ALL
    environment:
      <<: [*arclink-env, *arclink-control-secret-env]
      ARCLINK_DEPLOYMENT_EXEC_BROKER_URL: ${ARCLINK_DEPLOYMENT_EXEC_BROKER_URL:-http://deployment-exec-broker:8912}
      ARCLINK_DEPLOYMENT_EXEC_BROKER_TOKEN: ${ARCLINK_DEPLOYMENT_EXEC_BROKER_TOKEN:?run ./deploy.sh control bootstrap first}
    volumes:
      - ./arclink-priv/config:/home/arclink/arclink/arclink-priv/config
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/vault:/home/arclink/arclink/arclink-priv/vault
      - ./arclink-priv/published:/home/arclink/arclink/arclink-priv/published
      - ./arclink-priv/quarto:/home/arclink/arclink/arclink-priv/quarto
      - ./arclink-priv/secrets/container:/home/arclink/arclink/arclink-priv/secrets
      - ./arclink-priv/secrets/ssh:/home/arclink/arclink/arclink-priv/secrets/ssh
      - arclink-qmd:/home/arclink/.qmd
      - ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}:${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
      - ./arclink-priv/secrets/ssh:/home/arclink/.ssh
    command:
      - ./bin/docker-job-loop.sh
      - control-provisioner
      - ${ARCLINK_CONTROL_PROVISIONER_INTERVAL_SECONDS:-30}
      - python3
      - python/arclink_sovereign_worker.py
      - --once
      - --json
    depends_on:
      deployment-exec-broker:
        condition: service_healthy
    networks:
      - default
      - deployment-exec-broker-net

  control-action-worker:
    <<: *arclink-app
    # Docker lifecycle/apply operations are delegated to deployment-exec-broker.
    # Non-dry-run Pod migration file capture is delegated to the root
    # migration-capture-helper and still requires the operator opt-in.
    cap_drop:
      - ALL
    environment:
      <<: [*arclink-env, *arclink-control-secret-env]
      ARCLINK_DEPLOYMENT_EXEC_BROKER_URL: ${ARCLINK_DEPLOYMENT_EXEC_BROKER_URL:-http://deployment-exec-broker:8912}
      ARCLINK_DEPLOYMENT_EXEC_BROKER_TOKEN: ${ARCLINK_DEPLOYMENT_EXEC_BROKER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_MIGRATION_CAPTURE_HELPER_URL: ${ARCLINK_MIGRATION_CAPTURE_HELPER_URL:-http://migration-capture-helper:8914}
      ARCLINK_MIGRATION_CAPTURE_HELPER_TOKEN: ${ARCLINK_MIGRATION_CAPTURE_HELPER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_ACTION_WORKER_ALLOW_ROOT_MIGRATION_CAPTURE: ${ARCLINK_ACTION_WORKER_ALLOW_ROOT_MIGRATION_CAPTURE:-0}
    volumes:
      - ./arclink-priv/config:/home/arclink/arclink/arclink-priv/config
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/vault:/home/arclink/arclink/arclink-priv/vault
      - ./arclink-priv/published:/home/arclink/arclink/arclink-priv/published
      - ./arclink-priv/quarto:/home/arclink/arclink/arclink-priv/quarto
      - ./arclink-priv/secrets/container:/home/arclink/arclink/arclink-priv/secrets
      - ./arclink-priv/secrets/ssh:/home/arclink/arclink/arclink-priv/secrets/ssh
      - ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}:${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
      - ./arclink-priv/secrets/ssh:/home/arclink/.ssh
    command:
      - ./bin/docker-job-loop.sh
      - control-action-worker
      - ${ARCLINK_ACTION_WORKER_INTERVAL_SECONDS:-15}
      - python3
      - python/arclink_action_worker.py
      - --once
      - --json
    depends_on:
      control-api:
        condition: service_healthy
      deployment-exec-broker:
        condition: service_healthy
      migration-capture-helper:
        condition: service_healthy
    networks:
      - default
      - deployment-exec-broker-net
      - migration-capture-helper-net

  vault-watch:
    <<: *arclink-app
    command: ["./bin/vault-watch.sh"]
    depends_on:
      qmd-mcp:
        condition: service_started

  agent-supervisor-broker:
    <<: *arclink-app
    cap_drop:
      - ALL
    environment:
      ARCLINK_DOCKER_MODE: "1"
      ARCLINK_DOCKER_BINARY: ${ARCLINK_DOCKER_BINARY:-docker}
      ARCLINK_REPO_DIR: /home/arclink/arclink
      ARCLINK_DOCKER_IMAGE: ${ARCLINK_DOCKER_IMAGE:-arclink/app:local}
      ARCLINK_DOCKER_HOST_PRIV_DIR: ${ARCLINK_DOCKER_HOST_PRIV_DIR:-}
      ARCLINK_DOCKER_CONTAINER_PRIV_DIR: /home/arclink/arclink/arclink-priv
      ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED: ${ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED:-}
      ARCLINK_AGENT_SUPERVISOR_BROKER_TOKEN: ${ARCLINK_AGENT_SUPERVISOR_BROKER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_AGENT_SUPERVISOR_BROKER_HOST: 0.0.0.0
      ARCLINK_AGENT_SUPERVISOR_BROKER_PORT: 8913
    group_add:
      - ${ARCLINK_DOCKER_SOCKET_GID:-0}
    volumes:
      # Intentional trusted-host boundary: only this broker owns Docker
      # network/proxy sidecar authority for Docker-mode agent dashboards.
      - /var/run/docker.sock:/var/run/docker.sock
      # Narrow durable incident lane for rejected dashboard broker requests.
      - ./arclink-priv/state/docker/agent-supervisor-broker:/home/arclink/arclink/arclink-priv/state/docker/agent-supervisor-broker
    command: ["python3", "python/arclink_agent_supervisor_broker.py"]
    networks:
      - agent-supervisor-broker-net
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8913/health >/dev/null"]

  operator-upgrade-broker:
    <<: *arclink-app
    # This broker intentionally owns the trusted-host upgrade boundary. It must
    # run as root inside the container when the live checkout is under /root so
    # Docker Compose resolves host bind paths to paths the host daemon can see.
    user: "0:0"
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    environment:
      ARCLINK_DOCKER_MODE: "1"
      ARCLINK_CONTAINER_RUNTIME: docker
      ARCLINK_COMPONENT_UPGRADE_MODE: docker
      ARCLINK_REPO_DIR: /home/arclink/arclink
      ARCLINK_DOCKER_HOST_REPO_DIR: ${ARCLINK_DOCKER_HOST_REPO_DIR:-}
      ARCLINK_DOCKER_HOST_PRIV_DIR: ${ARCLINK_DOCKER_HOST_PRIV_DIR:-}
      ARCLINK_DOCKER_CONTAINER_PRIV_DIR: /home/arclink/arclink/arclink-priv
      ARCLINK_DOCKER_BINARY: ${ARCLINK_DOCKER_BINARY:-docker}
      ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED: ${ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED:-}
      ARCLINK_OPERATOR_UPGRADE_BROKER_TOKEN: ${ARCLINK_OPERATOR_UPGRADE_BROKER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_OPERATOR_UPGRADE_BROKER_HOST: 0.0.0.0
      ARCLINK_OPERATOR_UPGRADE_BROKER_PORT: 8917
    group_add:
      - ${ARCLINK_DOCKER_SOCKET_GID:-0}
    volumes:
      # Intentional trusted-host boundary: only this broker owns queued
      # Docker-mode operator upgrade execution from the live host checkout.
      - /var/run/docker.sock:/var/run/docker.sock
      # Keep the live checkout available at its host path for allowlisted
      # operator upgrades without overlaying /home/arclink/arclink. The host
      # checkout carries arclink-priv for upgrade config/logs, so avoid also
      # mounting broad canonical private config/state/secret paths here.
      - ${ARCLINK_DOCKER_HOST_REPO_DIR:-.}:${ARCLINK_DOCKER_HOST_REPO_DIR:-/home/arclink/arclink}
    command: ["python3", "python/arclink_operator_upgrade_broker.py"]
    networks:
      - operator-upgrade-broker-net
      - operator-upgrade-broker-egress-net
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8917/health >/dev/null"]

  agent-user-helper:
    image: ${ARCLINK_DOCKER_IMAGE:-arclink/app:local}
    restart: *restart-unless-stopped
    security_opt:
      - no-new-privileges:true
    # Intentional trusted-host root boundary: container-local user/home setup
    # accepts only canonical Docker agent-home requests and never mounts the
    # Docker socket or broad private state.
    user: "0:0"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    environment:
      ARCLINK_DOCKER_MODE: "1"
      ARCLINK_DOCKER_AGENT_HOME_ROOT: /home/arclink/arclink/arclink-priv/state/docker/users
      ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED: ${ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED:-}
      ARCLINK_AGENT_USER_HELPER_TOKEN: ${ARCLINK_AGENT_USER_HELPER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_AGENT_USER_HELPER_HOST: 0.0.0.0
      ARCLINK_AGENT_USER_HELPER_PORT: 8915
    volumes:
      - ./arclink-priv/state/docker/users:/home/arclink/arclink/arclink-priv/state/docker/users
    command: ["python3", "python/arclink_agent_user_helper.py"]
    networks:
      - agent-user-helper-net
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8915/health >/dev/null"]

  agent-process-helper:
    image: ${ARCLINK_DOCKER_IMAGE:-arclink/app:local}
    restart: *restart-unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Intentional trusted-host root boundary: this helper owns only validated
    # setpriv-based Docker agent command execution and gateway/dashboard
    # process handles. It never mounts the Docker socket.
    user: "0:0"
    environment:
      ARCLINK_DOCKER_MODE: "1"
      ARCLINK_CONTAINER_RUNTIME: docker
      ARCLINK_AGENT_SERVICE_MANAGER: docker-supervisor
      ARCLINK_REPO_DIR: /home/arclink/arclink
      ARCLINK_PRIV_DIR: /home/arclink/arclink/arclink-priv
      ARCLINK_DOCKER_CONTAINER_PRIV_DIR: /home/arclink/arclink/arclink-priv
      ARCLINK_DOCKER_AGENT_HOME_ROOT: /home/arclink/arclink/arclink-priv/state/docker/users
      RUNTIME_DIR: /opt/arclink/runtime
      ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED: ${ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED:-}
      ARCLINK_AGENT_PROCESS_HELPER_TOKEN: ${ARCLINK_AGENT_PROCESS_HELPER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_AGENT_PROCESS_HELPER_HOST: 0.0.0.0
      ARCLINK_AGENT_PROCESS_HELPER_PORT: 8916
    volumes:
      - ./arclink-priv/config:/home/arclink/arclink/arclink-priv/config
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/vault:/home/arclink/arclink/arclink-priv/vault
      - ./arclink-priv/published:/home/arclink/arclink/arclink-priv/published
      - ./arclink-priv/quarto:/home/arclink/arclink/arclink-priv/quarto
      - arclink-qmd:/home/arclink/.qmd
      # The helper only needs to read ArcLink scripts from the live checkout.
      - ${ARCLINK_DOCKER_HOST_REPO_DIR:-.}:${ARCLINK_DOCKER_HOST_REPO_DIR:-/home/arclink/arclink}:ro
    command: ["python3", "python/arclink_agent_process_helper.py"]
    networks:
      - agent-process-helper-net
      - agent-process-helper-egress-net
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8916/health >/dev/null"]

  agent-supervisor:
    <<: *arclink-job
    # User/home setup, agent process execution, and dashboard Docker
    # network/proxy work are delegated to command-specific helpers/brokers.
    environment:
      <<: *arclink-env
      ARCLINK_CONTAINER_RUNTIME: docker
      ARCLINK_AGENT_SERVICE_MANAGER: docker-supervisor
      ARCLINK_AGENT_USER_HELPER_URL: ${ARCLINK_AGENT_USER_HELPER_URL:-http://agent-user-helper:8915}
      ARCLINK_AGENT_USER_HELPER_TOKEN: ${ARCLINK_AGENT_USER_HELPER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_AGENT_PROCESS_HELPER_URL: ${ARCLINK_AGENT_PROCESS_HELPER_URL:-http://agent-process-helper:8916}
      ARCLINK_AGENT_PROCESS_HELPER_TOKEN: ${ARCLINK_AGENT_PROCESS_HELPER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_AGENT_SUPERVISOR_BROKER_URL: ${ARCLINK_AGENT_SUPERVISOR_BROKER_URL:-http://agent-supervisor-broker:8913}
      ARCLINK_AGENT_SUPERVISOR_BROKER_TOKEN: ${ARCLINK_AGENT_SUPERVISOR_BROKER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_OPERATOR_UPGRADE_BROKER_URL: ${ARCLINK_OPERATOR_UPGRADE_BROKER_URL:-http://operator-upgrade-broker:8917}
      ARCLINK_OPERATOR_UPGRADE_BROKER_TOKEN: ${ARCLINK_OPERATOR_UPGRADE_BROKER_TOKEN:?run ./deploy.sh control bootstrap first}
    volumes:
      - ./arclink-priv/config:/home/arclink/arclink/arclink-priv/config
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/vault:/home/arclink/arclink/arclink-priv/vault
      - ./arclink-priv/published:/home/arclink/arclink/arclink-priv/published
      - ./arclink-priv/quarto:/home/arclink/arclink/arclink-priv/quarto
      - ./arclink-priv/secrets/container:/home/arclink/arclink/arclink-priv/secrets
      - arclink-qmd:/home/arclink/.qmd
      # Keep the live checkout available read-only at its host path for refresh and
      # detection helpers without overlaying /home/arclink/arclink; overlaying
      # the repo can expose a private-state symlink and defeat split mounts.
      - ${ARCLINK_DOCKER_HOST_REPO_DIR:-.}:${ARCLINK_DOCKER_HOST_REPO_DIR:-/home/arclink/arclink}:ro
    command: ["./bin/docker-agent-supervisor.sh"]
    depends_on:
      agent-user-helper:
        condition: service_healthy
      agent-process-helper:
        condition: service_healthy
      agent-supervisor-broker:
        condition: service_healthy
      operator-upgrade-broker:
        condition: service_healthy
    networks:
      - default
      - agent-user-helper-net
      - agent-process-helper-net
      - agent-supervisor-broker-net
      - operator-upgrade-broker-net

  ssot-batcher:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "ssot-batcher", "300", "./bin/arclink-ssot-batcher.sh"]

  gateway-exec-broker:
    <<: *arclink-app
    cap_drop:
      - ALL
    environment:
      ARCLINK_STATE_ROOT_BASE: ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
      ARCLINK_DOCKER_BINARY: ${ARCLINK_DOCKER_BINARY:-docker}
      ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED: ${ARCLINK_DOCKER_TRUSTED_HOST_RISK_ACCEPTED:-}
      ARCLINK_GATEWAY_EXEC_BROKER_TOKEN: ${ARCLINK_GATEWAY_EXEC_BROKER_TOKEN:?run ./deploy.sh control bootstrap first}
      ARCLINK_GATEWAY_EXEC_BROKER_HOST: 0.0.0.0
      ARCLINK_GATEWAY_EXEC_BROKER_PORT: 8911
    group_add:
      - ${ARCLINK_DOCKER_SOCKET_GID:-0}
    volumes:
      # The broker only needs rendered deployment Compose files plus the
      # per-request bridge payload; do not mount broad private state here.
      - ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}:${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
      # Intentional trusted-host broker boundary: only this broker owns Docker
      # exec authority for Raven-mediated public-channel Hermes gateway turns.
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python3", "python/arclink_gateway_exec_broker.py"]
    networks:
      - gateway-exec-broker-net
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8911/health >/dev/null"]

  notification-delivery:
    <<: *arclink-job
    cap_drop:
      - ALL
    environment:
      <<: [*arclink-env, *arclink-control-secret-env]
      ARCLINK_GATEWAY_EXEC_BROKER_URL: ${ARCLINK_GATEWAY_EXEC_BROKER_URL:-http://gateway-exec-broker:8911}
      ARCLINK_GATEWAY_EXEC_BROKER_TOKEN: ${ARCLINK_GATEWAY_EXEC_BROKER_TOKEN:?run ./deploy.sh control bootstrap first}
    volumes:
      - ./arclink-priv/config:/home/arclink/arclink/arclink-priv/config
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/vault:/home/arclink/arclink/arclink-priv/vault
      - ./arclink-priv/published:/home/arclink/arclink/arclink-priv/published
      - ./arclink-priv/quarto:/home/arclink/arclink/arclink-priv/quarto
      - ./arclink-priv/secrets/container:/home/arclink/arclink/arclink-priv/secrets
      - arclink-qmd:/home/arclink/.qmd
      - ${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}:${ARCLINK_STATE_ROOT_BASE:-/arcdata/deployments}
    command: ["./bin/docker-job-loop.sh", "notification-delivery", "1", "./bin/arclink-notification-delivery.sh"]
    depends_on:
      arclink-mcp:
        condition: service_started
      qmd-mcp:
        condition: service_started
      gateway-exec-broker:
        condition: service_healthy
    networks:
      - default
      - gateway-exec-broker-net

  arclink-wrapped:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "arclink-wrapped", "300", "./bin/arclink-wrapped.sh", "--json"]

  health-watch:
    <<: *arclink-job
    environment:
      <<: *arclink-env
      ARCLINK_HEALTH_WATCH_HEALTH_CMD: ./bin/docker-health.sh
    command: ["./bin/docker-job-loop.sh", "health-watch", "300", "./bin/health-watch.sh"]

  fleet-inventory-worker:
    <<: *arclink-job
    volumes:
      - ./arclink-priv/config:/home/arclink/arclink/arclink-priv/config
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/vault:/home/arclink/arclink/arclink-priv/vault
      - ./arclink-priv/published:/home/arclink/arclink/arclink-priv/published
      - ./arclink-priv/quarto:/home/arclink/arclink/arclink-priv/quarto
      - ./arclink-priv/secrets/container:/home/arclink/arclink/arclink-priv/secrets
      - ./arclink-priv/secrets/ssh:/home/arclink/arclink/arclink-priv/secrets/ssh
      - arclink-qmd:/home/arclink/.qmd
    command: ["./bin/docker-job-loop.sh", "fleet-inventory-worker", "30", "python3", "python/arclink_fleet_inventory_worker.py", "--once", "--json", "--notify"]

  curator-refresh:
    <<: *arclink-job
    cap_drop:
      - ALL
    volumes:
      - ./arclink-priv/config:/home/arclink/arclink/arclink-priv/config
      - ./arclink-priv/state:/home/arclink/arclink/arclink-priv/state
      - ./arclink-priv/vault:/home/arclink/arclink/arclink-priv/vault
      - ./arclink-priv/published:/home/arclink/arclink/arclink-priv/published
      - ./arclink-priv/quarto:/home/arclink/arclink/arclink-priv/quarto
      - ./arclink-priv/secrets/container:/home/arclink/arclink/arclink-priv/secrets
      - arclink-qmd:/home/arclink/.qmd
      # Keep the live checkout available read-only at its host path for refresh
      # and detection helpers without overlaying /home/arclink/arclink; overlaying
      # the repo can expose a private-state symlink and defeat split mounts.
      - ${ARCLINK_DOCKER_HOST_REPO_DIR:-.}:${ARCLINK_DOCKER_HOST_REPO_DIR:-/home/arclink/arclink}:ro
    command: ["./bin/docker-job-loop.sh", "curator-refresh", "900", "./bin/curator-refresh.sh"]

  qmd-refresh:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "qmd-refresh", "300", "./bin/qmd-refresh.sh", "--skip-embed"]

  pdf-ingest:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "pdf-ingest", "300", "./bin/pdf-ingest.sh", "--quiet"]

  memory-synth:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "memory-synth", "1800", "./bin/memory-synth.sh"]

  hermes-docs-sync:
    <<: *arclink-job
    command: ["./bin/docker-job-loop.sh", "hermes-docs-sync", "3600", "./bin/sync-hermes-docs-into-vault.sh"]

  quarto-render:
    <<: *arclink-job
    profiles: ["quarto"]
    command: ["./bin/docker-job-loop.sh", "quarto-render", "900", "./bin/render-quarto.sh"]

  backup:
    <<: *arclink-job
    profiles: ["backup"]
    command: ["./bin/docker-job-loop.sh", "backup", "3600", "./bin/backup-to-github.sh"]

  curator-gateway:
    <<: *arclink-app
    profiles: ["curator"]
    restart: on-failure
    command: ["./bin/curator-gateway.sh"]

  curator-onboarding:
    <<: *arclink-app
    profiles: ["curator"]
    restart: on-failure
    command: ["./bin/arclink-curator-onboarding.sh"]

  curator-discord-onboarding:
    <<: *arclink-app
    profiles: ["curator"]
    restart: on-failure
    command: ["./bin/arclink-curator-discord-onboarding.sh"]

volumes:
  arclink-qmd:

networks:
  default: {}
  deployment-exec-broker-net:
    internal: true
  migration-capture-helper-net:
    internal: true
  agent-user-helper-net:
    internal: true
  agent-process-helper-net:
    internal: true
  agent-supervisor-broker-net:
    internal: true
  operator-upgrade-broker-net:
    internal: true
  gateway-exec-broker-net:
    internal: true
  agent-process-helper-egress-net: {}
  operator-upgrade-broker-egress-net: {}
