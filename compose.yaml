  ARCLINK_CONFIG_FILE: /home/arclink/arclink/arclink-priv/state/operator/config/operator.env
  ARCLINK_PRIV_CONFIG_DIR: /home/arclink/arclink/arclink-priv/state/operator/config
  ARCLINK_OPERATOR_STATE_DIR: /home/arclink/arclink/arclink-priv/state/operator
  ARCLINK_OPERATOR_SECRET_DIR: /home/arclink/arclink/arclink-priv/state/operator/secrets
  ARCLINK_DB_PATH: /home/arclink/arclink/arclink-priv/state/arclink-control.sqlite3
  ARCLINK_DEPLOYMENT_ID: operator
  ARCLINK_USER_ID: operator
  ARCLINK_PREFIX: operator
  ARCLINK_AGENT_NAME: ${ARCLINK_OPERATOR_AGENT_DISPLAY_NAME:-Operator Hermes}
  ARCLINK_AGENT_TITLE: ${ARCLINK_OPERATOR_AGENT_TITLE:-ArcLink Operator Hermes}
  ARCLINK_DASHBOARD_AGENT_LABEL: ${ARCLINK_OPERATOR_AGENT_DISPLAY_NAME:-Operator Hermes}
  ARCLINK_DASHBOARD_AGENT_TITLE: ${ARCLINK_OPERATOR_AGENT_TITLE:-ArcLink Operator Hermes}
  ARCLINK_DASHBOARD_USERNAME: ${ARCLINK_OPERATOR_AGENT_EMAIL:-operator}
  ARCLINK_CAPTAIN_NAME: ${ARCLINK_OPERATOR_AGENT_DISPLAY_NAME:-ArcLink Operator}
  ARCLINK_CAPTAIN_EMAIL: ${ARCLINK_OPERATOR_AGENT_EMAIL:-}
  HERMES_HOME: /home/arclink/arclink/arclink-priv/state/operator/hermes-home
  VAULT_DIR: /home/arclink/arclink/arclink-priv/state/operator/vault
  DRIVE_ROOT: /home/arclink/arclink/arclink-priv/state/operator/vault
  CODE_WORKSPACE_ROOT: /home/arclink/arclink/arclink-priv/state/operator/workspace
  TERMINAL_WORKSPACE_ROOT: /home/arclink/arclink/arclink-priv/state/operator/workspace
  DRIVE_LINKED_ROOT: /home/arclink/arclink/arclink-priv/state/operator/linked-resources
  CODE_LINKED_ROOT: /home/arclink/arclink/arclink-priv/state/operator/linked-resources
  ARCLINK_LINKED_RESOURCES_ROOT: /home/arclink/arclink/arclink-priv/state/operator/linked-resources
  ARCLINK_DRIVE_ROOT: /home/arclink/arclink/arclink-priv/state/operator/vault
