      POSTGRES_PASSWORD: ${ARCLINK_OPERATOR_NEXTCLOUD_DB_PASSWORD:?run ./deploy.sh control bootstrap first}
    volumes:
      - ./arclink-priv/state/operator/nextcloud/db:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-fast
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d operator_nextcloud"]

  control-operator-nextcloud-redis:
    image: ${ARCLINK_REDIS_IMAGE:-docker.io/library/redis}:${ARCLINK_REDIS_TAG:-7-alpine}
