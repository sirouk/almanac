      retries: 10

  control-operator-arclink-wrapped:
    <<: *arclink-app
    environment:
      <<: *arclink-operator-env
    command: ["./bin/docker-job-loop.sh", "operator-arclink-wrapped", "300", "./bin/arclink-wrapped.sh", "--json"]
