  STATE_DIR: /home/arclink/arclink/arclink-priv/state/operator/memory
  PUBLISHED_DIR: /home/arclink/arclink/arclink-priv/state/operator/memory/published
  QUARTO_PROJECT_DIR: /home/arclink/arclink/arclink-priv/state/operator/quarto
  ARCLINK_MEMORY_SYNTH_STATUS_FILE: /home/arclink/arclink/arclink-priv/state/operator/memory/memory-synth/status.json
  ARCLINK_MEMORY_SYNTH_LOCK_FILE: /home/arclink/arclink/arclink-priv/state/operator/memory/memory-synth/synth.lock
  ARCLINK_HERMES_URL: ${ARCLINK_OPERATOR_HERMES_URL:-http://localhost:13210}
  ARCLINK_DASHBOARD_URL: ${ARCLINK_OPERATOR_HERMES_URL:-http://localhost:13210}
