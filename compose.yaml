      POSTGRES_PASSWORD: ${ARCLINK_OPERATOR_NEXTCLOUD_DB_PASSWORD:?run ./deploy.sh control bootstrap first}
      NEXTCLOUD_ADMIN_USER: ${ARCLINK_OPERATOR_NEXTCLOUD_ADMIN_USER:-operator}
      NEXTCLOUD_ADMIN_PASSWORD: ${ARCLINK_OPERATOR_NEXTCLOUD_ADMIN_PASSWORD:?run ./deploy.sh control bootstrap first}
      REDIS_HOST: control-operator-nextcloud-redis
      NEXTCLOUD_TRUSTED_DOMAINS: localhost 127.0.0.1 ${NEXTCLOUD_TRUSTED_DOMAIN:-localhost}
      OVERWRITEPROTOCOL: ${NEXTCLOUD_OVERWRITEPROTOCOL:-http}
    volumes:
      - ./arclink-priv/state/operator/nextcloud/html:/var/www/html
