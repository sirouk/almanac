services:
  db:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - "${NEXTCLOUD_DB_DIR}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextcloud} -d ${POSTGRES_DB:-nextcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    volumes:
      - "${NEXTCLOUD_REDIS_DIR}:/data"

  app:
    image: docker.io/library/nextcloud:31-apache
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:${NEXTCLOUD_PORT:-18080}:80"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_HOST: db
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-change-me}
      REDIS_HOST: redis
      NEXTCLOUD_TRUSTED_DOMAINS: localhost 127.0.0.1 ${NEXTCLOUD_TRUSTED_DOMAIN:-localhost}
      OVERWRITEPROTOCOL: https
    volumes:
      - "${NEXTCLOUD_ALMANAC_CONFIG_FILE}:/almanac-config/almanac.config.php:ro"
      - "${NEXTCLOUD_HTML_DIR}:/var/www/html"
      - "${NEXTCLOUD_DATA_DIR}:/var/www/html/data"
      - "${NEXTCLOUD_POST_INSTALL_HOOK_DIR}:/docker-entrypoint-hooks.d/post-installation"
      - "${NEXTCLOUD_BEFORE_STARTING_HOOK_DIR}:/docker-entrypoint-hooks.d/before-starting"
      - "${NEXTCLOUD_EMPTY_SKELETON_DIR}:/srv/nextcloud-empty-skeleton"
      - "${VAULT_DIR}:/srv/vault"
