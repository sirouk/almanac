        - Missing source checksums or unresolved ingestion warnings.
        - Unmatched enrolled agents after profile apply.
      must_ask_before:
        - Reading private user state.
        - Pushing code or changing production state.
        - Enabling a new integration, credential lane, or high-privilege automation.
