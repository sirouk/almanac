# Copy this file to almanac-priv/config/org-profile.yaml and replace every
# fictional value with the operator's real solo practice, family/household,
# project collective, organization, or hybrid operating context.
# Do not commit the populated private file.
$schema: https://almanac.local/schema/org-profile.schema.json
version: 1

organization:
  id: northstar-almanac-demo
  name: Northstar Almanac Demo
  profile_kind: hybrid
  scope: Fictional template demonstrating solo, family/household, project collective, and organization-style use from one ingestion contract.
  mission: Keep the people, agents, knowledge, decisions, and automations of the operating context aligned around work and life that matter.
  primary_project: Establish a repeatable agent onboarding and distribution system for every personal, household, project, and team lane.
  timezone: America/New_York
  quiet_hours: "21:00-08:00 local time unless the human explicitly opts in."
  operating_modes:
    - id: solo_operator
      description: One person runs Almanac for their own projects, notes, automations, and personal operating rhythm.
      applies_to: [solo-practice]
      default_boundaries:
        - The agent may help organize and execute personal workflows, but the human still owns all decisions and external commitments.
        - Private journals, medical records, legal records, finances, and credentials require explicit per-task permission.
    - id: family_household
      description: A household or family uses Almanac for shared planning, routines, documents, care logistics, and decisions.
      applies_to: [household]
      default_boundaries:
        - Agents may coordinate shared reminders and drafts, but each person keeps consent over their own private context.
        - Family-sensitive records stay need-to-know and should not be summarized into broad shared memory by default.
    - id: project_collective
      description: A temporary or standing group collaborates around a project without every participant belonging to one company.
      applies_to: [project-collective]
      default_boundaries:
        - Agents preserve source pointers, owners, decisions, and open questions across contributors.
        - External publication, spending, production changes, and public commitments require named human approval.
    - id: organization_team
      description: A formal team or company uses Almanac for departments, source-of-truth systems, onboarding, operations, and production workflows.
      applies_to: [leadership, platform, operations, knowledge, communications]
      default_boundaries:
        - Shared work belongs in governed shared rails.
        - Agents do not impersonate employees, relatives, or collaborators by default.
  operating_principles:
    - Humans own accountability, consent, judgment, and external commitments.
    - Agents prepare, retrieve, draft, maintain context, and execute scoped tasks inside the authority of the human they serve.
    - Shared work belongs in shared source-of-truth rails; private scratchpads are for private or draft work only.
    - Retrieve current source material before making profile-specific claims.
    - Preserve source pointers when transforming seed material into agent profiles, docs, tasks, or managed memory.
    - Revalidate live facts before external publication, customer commitments, spending, production changes, or safety-sensitive action.
    - Prefer small, auditable automation over opaque agent improvisation.
  glossary:
    - term: Agent Lineage
      definition: The shared baseline, modules, templates, and source references used to generate specialized agents.
    - term: Prototype Agent
      definition: A reference implementation that teaches useful operating discipline without becoming every future agent.
    - term: Human Owner Module
      definition: The context, preferences, boundaries, and workflows for the human served by one agent.
    - term: Source Packet
      definition: A non-secret collection of files, notes, docs, exports, and references used during ingestion.

roles:
  operator:
    description: Owns Almanac deployment, policy, access, agent generation, and production alignment for any operating context.
    responsibilities:
      - Review and apply the private operating profile.
      - Maintain deployment health, source-of-truth rails, and upgrade policy.
      - Keep private state and credentials outside public examples and generated docs.
    decision_authority:
      - Final approval for Almanac deployment and production-impacting configuration.
      - Final approval for onboarding new humans and enabling high-privilege automations.
    agent_posture: Be exact, conservative, and explicit about what was verified.

  strategy_lead:
    description: Owns direction, priority tradeoffs, external commitments, and final decisions across lanes.
    responsibilities:
      - Maintain the mission, priorities, decision log, and active focus list.
      - Approve commitments that affect scope, budget, customers, reputation, or schedule.
      - Resolve cross-team ownership or priority conflicts.
    decision_authority:
      - Final say on roadmap priority and external commitments.
      - May pause or redirect agent automation.
    agent_posture: Prepare concise decision support and surface the next human choice.

  operations_lead:
    description: Owns recurring operations, support queues, rituals, handoffs, and process reliability.
    responsibilities:
      - Keep operational queues current and assigned.
      - Maintain playbooks and recurring checklists.
      - Ensure support or family/admin follow-through is visible.
    decision_authority:
      - May reprioritize routine operational work inside the current week.
      - May approve process improvements that do not affect budget, production, or external commitments.
    agent_posture: Keep queues tidy, make status easy to scan, and escalate exceptions early.

  engineering_lead:
    description: Owns technical delivery, runtime quality, implementation safety, and production readiness.
    responsibilities:
      - Review technical plans, code risk, releases, and operational health.
      - Keep technical docs and runbooks accurate.
      - Block release on security, stability, data integrity, or reversibility concerns.
    decision_authority:
      - May approve technical plans inside authorized scope.
      - May block production changes on technical risk.
    agent_posture: Be precise about code, tests, deployment state, and uncertainty.

  knowledge_curator:
    description: Owns knowledge architecture, source packets, ingestion summaries, retrieval quality, and evergreen docs.
    responsibilities:
      - Preserve source pointers and checksums.
      - Turn raw material into structured baselines, modules, templates, and open questions.
      - Keep generated docs marked as generated and traceable to source.
    decision_authority:
      - May reorganize non-authoritative knowledge assets.
      - Must not change accountability or approval boundaries without operator approval.
    agent_posture: Separate source, summary, inference, and question.

  communications_lead:
    description: Owns public or cross-team communication, publishing calendars, audience tone, and review pipelines.
    responsibilities:
      - Draft and maintain reviewable content pipelines.
      - Keep claims source-linked and revalidated before publication.
      - Maintain social, newsletter, event, and announcement workflows.
    decision_authority:
      - May prepare drafts and campaign plans.
      - Humans approve publication, scheduling, and commitments.
    agent_posture: Draft well, verify claims, and ask before sending.

  solo_practice_owner:
    description: Owns a personal Almanac lane for individual projects, learning, household-adjacent tasks, and life administration.
    responsibilities:
      - Maintain personal priorities, commitments, notes, routines, and reflection surfaces.
      - Decide which private materials may be summarized, indexed, or shared.
      - Keep personal automations bounded and reversible.
    decision_authority:
      - Final approval for personal schedule, spending, publication, and delegation choices.
      - May pause all proactive agent behavior.
    agent_posture: Be useful without being intrusive; ask before crossing privacy or external-action boundaries.

  household_coordinator:
    description: Owns household or family coordination without overriding individual consent or privacy.
    responsibilities:
      - Keep shared plans, routines, documents, and logistics visible to the right people.
      - Track errands, appointments, maintenance, travel, school, care, or household admin when authorized.
      - Preserve each person's private boundaries.
    decision_authority:
      - May organize shared household records and reminders.
      - Must get explicit approval for commitments, spending, sensitive summaries, or messages on another person's behalf.
    agent_posture: Coordinate gently, keep consent visible, and avoid turning private context into shared context.

