customCSS: |
  :root[data-layout-variant="standard"] {
    --arclink-jet: #080808;
    --arclink-carbon: #0f0f0e;
    --arclink-surface: #181817;
    --arclink-soft-white: #e7e6e6;
    --arclink-signal-orange: #fb5005;
    --arclink-electric-blue: #2075fe;
    --arclink-neon-green: #1ac153;
    --arclink-hairline: rgba(251, 80, 5, 0.24);
    --arclink-panel-glow: 0 0 0 1px rgba(231, 230, 230, 0.06), 0 18px 50px -38px rgba(251, 80, 5, 0.7);
  }

  :root[data-layout-variant="standard"] ::selection {
    background: rgba(251, 80, 5, 0.34);
    color: #ffffff;
  }

  :root[data-layout-variant="standard"] * {
    scrollbar-color: rgba(251, 80, 5, 0.58) rgba(15, 15, 14, 0.92);
  }

  :root[data-layout-variant="standard"] body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    background:
      linear-gradient(90deg, transparent 0%, rgba(251, 80, 5, 0.1) 48%, rgba(32, 117, 254, 0.08) 52%, transparent 100%),
      repeating-linear-gradient(to bottom, transparent 0 3px, rgba(231, 230, 230, 0.018) 3px 4px);
    background-size: 160% 100%, auto;
    opacity: 0.36;
    mix-blend-mode: screen;
    animation: arclink-theme-scan 11s linear infinite;
  }

  @keyframes arclink-theme-scan {
    from { background-position: -120% 0, 0 0; }
    to { background-position: 220% 0, 0 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    :root[data-layout-variant="standard"] body::before {
      animation: none;
      opacity: 0.22;
    }
  }

  :root[data-layout-variant="standard"] #app-sidebar,
  :root[data-layout-variant="standard"] header {
    box-shadow: var(--arclink-panel-glow);
  }

  :root[data-layout-variant="standard"] #app-sidebar::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(251, 80, 5, 0.08), transparent 26%),
      linear-gradient(90deg, rgba(251, 80, 5, 0.1), transparent 40%);
    opacity: 0.85;
  }

  :root[data-layout-variant="standard"] #app-sidebar nav a {
    border-left: 1px solid transparent;
    margin: 1px 0;
  }

  :root[data-layout-variant="standard"] #app-sidebar nav a[aria-current="page"] {
    background: linear-gradient(90deg, rgba(251, 80, 5, 0.22), rgba(32, 117, 254, 0.07), transparent 86%);
    border-left-color: var(--arclink-signal-orange);
    box-shadow: inset 0 0 0 1px rgba(251, 80, 5, 0.08);
  }

  :root[data-layout-variant="standard"] #app-sidebar nav a:hover {
    background: linear-gradient(90deg, rgba(251, 80, 5, 0.12), rgba(231, 230, 230, 0.03));
  }

  :root[data-layout-variant="standard"] #app-sidebar > div:last-child,
  :root[data-layout-variant="standard"] footer {
    background: linear-gradient(90deg, rgba(251, 80, 5, 0.08), rgba(32, 117, 254, 0.04), transparent);
    border-color: rgba(251, 80, 5, 0.18);
  }

  :root[data-layout-variant="standard"] [class*="bg-card"],
  :root[data-layout-variant="standard"] [role="dialog"],
  :root[data-layout-variant="standard"] [role="listbox"] {
    border-color: var(--arclink-hairline);
    box-shadow: var(--arclink-panel-glow);
    backdrop-filter: blur(14px);
  }

  :root[data-layout-variant="standard"] [class*="border-border"] {
    border-color: rgba(251, 80, 5, 0.2);
  }

  :root[data-layout-variant="standard"] [class*="text-muted-foreground"] {
    color: rgba(231, 230, 230, 0.58);
  }

  :root[data-layout-variant="standard"] button,
  :root[data-layout-variant="standard"] [role="button"] {
    border-radius: min(var(--theme-radius), 0.375rem);
  }

  :root[data-layout-variant="standard"] button:hover,
  :root[data-layout-variant="standard"] [role="button"]:hover {
    box-shadow: 0 0 0 1px rgba(251, 80, 5, 0.18), 0 0 20px -12px rgba(251, 80, 5, 0.9);
  }

  :root[data-layout-variant="standard"] input,
  :root[data-layout-variant="standard"] textarea,
  :root[data-layout-variant="standard"] select {
    background-color: rgba(15, 15, 14, 0.9);
    border-color: rgba(251, 80, 5, 0.24);
    color: var(--arclink-soft-white);
  }

  :root[data-layout-variant="standard"] input:focus,
  :root[data-layout-variant="standard"] textarea:focus,
  :root[data-layout-variant="standard"] select:focus {
    outline-color: var(--arclink-signal-orange);
    box-shadow: 0 0 0 1px rgba(251, 80, 5, 0.42), 0 0 24px -14px rgba(251, 80, 5, 0.9);
  }

  :root[data-layout-variant="standard"] table {
    border-color: rgba(251, 80, 5, 0.18);
  }

  :root[data-layout-variant="standard"] thead {
    background: linear-gradient(90deg, rgba(251, 80, 5, 0.12), rgba(32, 117, 254, 0.06));
  }

  :root[data-layout-variant="standard"] tr:hover {
    background-color: rgba(251, 80, 5, 0.055);
  }

  :root[data-layout-variant="standard"] code,
  :root[data-layout-variant="standard"] pre,
  :root[data-layout-variant="standard"] kbd,
  :root[data-layout-variant="standard"] .xterm,
  :root[data-layout-variant="standard"] .xterm-viewport,
  :root[data-layout-variant="standard"] .xterm-screen {
    color-scheme: dark;
  }

  :root[data-layout-variant="standard"] pre,
  :root[data-layout-variant="standard"] .xterm {
    background: linear-gradient(180deg, rgba(8, 8, 8, 0.96), rgba(15, 15, 14, 0.98));
    border-color: rgba(251, 80, 5, 0.18);
  }

  :root[data-layout-variant="standard"] a {
    text-decoration-color: rgba(251, 80, 5, 0.5);
  }

  :root[data-layout-variant="standard"] a:hover {
    color: #ffffff;
    text-decoration-color: var(--arclink-signal-orange);
  }

  :root[data-layout-variant="standard"] {
    --arclink-agent-label: "__ARCLINK_AGENT_LABEL__";
    --arclink-agent-theme-label: "__ARCLINK_THEME_LABEL__";
    --arclink-agent-accent: __ARCLINK_THEME_ACCENT_HEX__;
  }

  :root[data-layout-variant="standard"] #app-sidebar > div:first-child > div:first-child {
    align-items: center;
    min-height: 2.9rem;
    position: relative;
    width: 100%;
  }

  :root[data-layout-variant="standard"] #app-sidebar > div:first-child > div:first-child > * {
    opacity: 0 !important;
    pointer-events: none !important;
    width: 0 !important;
  }

  :root[data-layout-variant="standard"] #app-sidebar > div:first-child > div:first-child::before {
    background-image: var(--theme-asset-logo);
    background-position: left center;
    background-repeat: no-repeat;
    background-size: contain;
    content: "";
    display: block;
    height: 2.25rem;
    max-width: 100%;
    width: 11.5rem;
  }

  :root[data-layout-variant="standard"] header [class*="font-bold"] {
    background-image: var(--theme-asset-logo);
    background-position: left center;
    background-repeat: no-repeat;
    background-size: contain;
    color: transparent !important;
    display: inline-block;
    font-size: 0 !important;
    height: 1.75rem;
    line-height: 0;
    max-width: calc(100vw - 8rem);
    min-width: 9rem;
  }

  :root[data-layout-variant="standard"] body::after {
    background: linear-gradient(90deg, rgba(8, 8, 8, 0.9), rgba(24, 24, 23, 0.76));
    border: 1px solid color-mix(in srgb, var(--arclink-agent-accent) 68%, transparent);
    border-radius: 999px;
    box-shadow: 0 0 24px -16px var(--arclink-agent-accent);
    color: var(--arclink-soft-white);
    content: var(--arclink-agent-label) " / " var(--arclink-agent-theme-label);
    font-family: var(--font-sans, Inter, system-ui, sans-serif);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0;
    max-width: min(24rem, calc(100vw - 7rem));
    overflow: hidden;
    padding: 0.34rem 0.72rem;
    pointer-events: none;
    position: fixed;
    right: 1rem;
    text-overflow: ellipsis;
    top: 0.8rem;
    white-space: nowrap;
    z-index: 80;
  }

  @media (max-width: 767px) {
    :root[data-layout-variant="standard"] body::after {
      left: 3.4rem;
      max-width: calc(100vw - 7.25rem);
      right: auto;
      top: 0.72rem;
    }
  }
